<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلب استشارة</title>

    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body>
    <div class="container" style="max-width: 600px; margin: 50px auto">
      <h1>طلب استشارة</h1>

      <form id="contactForm">
        <input
          type="text"
          id="name"
          placeholder="الاسم"
          required
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <input
          type="tel"
          id="phone"
          placeholder="رقم الجوال"
          required
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <textarea
          id="message"
          placeholder="اكتب طلبك"
          required
          style="width: 100%; padding: 10px; margin: 10px 0"
        ></textarea>

        <button type="submit" style="padding: 10px 20px">إرسال</button>
      </form>
    </div>

    <!-- config -->
    <script>
      window.DARB_SITE_CONFIG = {
        phone: "966567436557",
        googleSheetsWebAppUrl:
          "https://script.google.com/macros/s/AKfycbwKc4qf9k4v3Azt1n_tYUNeTv0go-9PJAyYoJzL42LfzFnG24RMD4_7cjzqFHUNRrc0mw/exec",
      };
    </script>

    <!-- script -->
    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const phone = document.getElementById("phone").value;
          const message = document.getElementById("message").value;

          // Google Sheets
          await fetch(window.DARB_SITE_CONFIG.googleSheetsWebAppUrl, {
            method: "POST",
            body: JSON.stringify({ name, phone, message }),
            headers: { "Content-Type": "application/json" },
          });

          // WhatsApp
          const text = `طلب جديد:
الاسم: ${name}
الجوال: ${phone}
الرسالة: ${message}`;

          const url = `https://wa.me/${window.DARB_SITE_CONFIG.phone}?text=${encodeURIComponent(text)}`;
          window.open(url, "_blank");

          alert("تم الإرسال");
        });
    </script>
  </body>
</html>
