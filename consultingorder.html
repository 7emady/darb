<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلب استشارة</title>
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>

  <body>
    <div class="container" style="max-width: 600px; margin: 50px auto">
      <h1>طلب استشارة</h1>

      <form id="contactForm">
        <input
          id="name"
          type="text"
          placeholder="الاسم"
          required
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <input
          id="phone"
          type="tel"
          placeholder="رقم الجوال"
          required
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <input
          id="email"
          type="email"
          placeholder="البريد الإلكتروني"
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <textarea
          id="message"
          placeholder="اكتب طلبك"
          required
          style="width: 100%; padding: 10px; margin: 10px 0; min-height: 130px"
        ></textarea>

        <button
          type="submit"
          style="
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 30px;
            background: #f59e0b;
            font-weight: bold;
            cursor: pointer;
          "
        >
          إرسال
        </button>

        <p id="formStatus" style="margin-top: 15px"></p>
      </form>
    </div>

    <script>
      const GOOGLE_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbwKc4qf9k4v3Azt1n_tYUNeTv0go-9PJAyYoJzL42LfzFnG24RMD4_7cjzqFHUNRrc0mw/exec";

      const WHATSAPP_NUMBER = "966567436557";

      document
        .getElementById("contactForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const status = document.getElementById("formStatus");

          const name = document.getElementById("name").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const email = document.getElementById("email").value.trim();
          const message = document.getElementById("message").value.trim();

          const data = {
            name,
            phone,
            email,
            message,
            submittedAt: new Date().toISOString(),
          };

          status.textContent = "جار إرسال الطلب...";

          try {
            await fetch(GOOGLE_SCRIPT_URL, {
              method: "POST",
              mode: "no-cors",
              headers: {
                "Content-Type": "text/plain;charset=utf-8",
              },
              body: JSON.stringify(data),
            });

            const whatsappText = `طلب استشارة جديد:
الاسم: ${name}
الجوال: ${phone}
البريد الإلكتروني: ${email || "غير مذكور"}
التفاصيل: ${message}`;

            window.open(
              "https://wa.me/" +
                WHATSAPP_NUMBER +
                "?text=" +
                encodeURIComponent(whatsappText),
              "_blank",
            );

            status.textContent = "تم إرسال الطلب بنجاح";
            this.reset();
          } catch (error) {
            console.error(error);
            status.textContent = "حدث خطأ أثناء الإرسال";
          }
        });
    </script>
  </body>
</html>
